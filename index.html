<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Q4 Drill 1</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Plus Jakarta Sans', sans-serif;
    margin:0;
    background:#c3e0ab;
}

.box{
    border-radius:16px;
    padding:35px;
    border:4px solid #718d6f;
    box-shadow:0px 4px 20px rgba(0,0,0,0.2);
    background: rgba(39,115,165,0.08);
    backdrop-filter:blur(8px);
}

.btn-custom{
    background:#ffffff;
    color:#75d84d;
    font-weight:600;
    border:none;
}

.btn-custom:hover{
    background:#d9d9d9;
}

</style>
</head>

<body>

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-6">
<div class="box text-center">
        <h2 style="color:#ffffff;">Emeralco</h2>
        <p style="color:#ffffff;">for all the bitcoin miners</p>

    <input type="number" id="kwh" class="form-control mb-3" placeholder="Enter electricity usage (kWh)">

<button onclick="classifyUsage()" class="btn btn-custom w-100">
Check Consumption
</button>

<br><br>

<h3 style="color:#ffffff;">Electricity Bill!</h3>
<h2 id="result" style="color:#ffffff;">---</h2>

</div>
</div>
</div>
</div>
<script>

function classifyUsage(){

let usage = document.getElementById("kwh").value;

usage = Number(usage);

if(isNaN(usage) || usage < 0){
alert("Please enter a valid electricity usage.");
return;
}

let category = "";

if(usage <= 100){
category = "You saving money?";
}
else if(usage <= 200){
category = "Low Consumption";
}
else if(usage <= 300){
category = "Average Consumption";
}
else if(usage <= 500){
category = "High consumption";
}
else{
category = "Very High Consumption";
}


document.getElementById("result").innerHTML = category;
}

</script>

</body>
</html>
